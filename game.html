<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل اللعبة</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo">
<h1>MOHGAMES PRO</h1>
</div>

<nav class="navbar">
<a href="index.html">الرئيسية</a>
<a href="news.html">الأخبار</a>
</nav>
</header>

<div id="gameDetails"></div>

<script src="games.js"></script>

<script>
const id = Number(localStorage.getItem("selectedGame"));
const game = window.games.find(g => g.id === id);

const box = document.getElementById("gameDetails");

if(game){

box.innerHTML = `
<div class="card" style="max-width:900px;margin:40px auto">

<img src="${game.image}" alt="${game.name}">

<div class="card-content">

<h1>${game.name}</h1>

<p>${game.description}</p>

<p><strong>المنصة:</strong> ${game.platform}</p>

<div class="btns">

<button class="btn download-btn"
onclick="window.open('${game.download}','_blank')">
الموقع الرسمي
</button>

<button class="btn details-btn"
onclick="window.location.href='index.html'">
الرجوع للرئيسية
</button>

</div>

</div>

</div>
`;

}else{

box.innerHTML = `
<h2 style="text-align:center;margin-top:50px">
اللعبة غير موجودة
</h2>
`;

}
</script>

</body>
</html>
